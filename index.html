<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AjayAI — Smart Chat Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <div class="logo-icon">A</div>
        <span class="logo-text">AjayAI</span>
      </div>
      <button class="new-chat-btn" onclick="newChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Chat
      </button>
    </div>

    <div class="history-label">Recent chats</div>
    <div class="history" id="history"></div>

    <div class="sidebar-footer">
      <div class="built-by">Built by <strong>Ajay Thakur</strong></div>
      <div class="built-sub">MCS Graduate · UOW 2024</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title" id="topbarTitle">AjayAI Assistant</div>
      <div class="model-badge">GPT-3.5</div>
    </header>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chatArea">

      <!-- WELCOME STATE -->
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          <div class="ai-orb">
            <div class="orb-inner"></div>
          </div>
        </div>
        <h1 class="welcome-title">Hello, I'm AjayAI</h1>
        <p class="welcome-sub">An AI assistant built by Ajay Thakur.<br>Ask me anything — I'm here to help.</p>
        <div class="suggestions">
          <button class="suggest-btn" onclick="useSuggestion(this)">Explain machine learning in simple terms</button>
          <button class="suggest-btn" onclick="useSuggestion(this)">Write a Python function to sort a list</button>
          <button class="suggest-btn" onclick="useSuggestion(this)">What are the best practices in REST API design?</button>
          <button class="suggest-btn" onclick="useSuggestion(this)">Help me prepare for a software engineering interview</button>
        </div>
      </div>

      <!-- MESSAGES -->
      <div class="messages" id="messages"></div>

    </div>

    <!-- INPUT AREA -->
    <div class="input-area">
      <div class="input-box">
        <textarea
          id="userInput"
          placeholder="Message AjayAI..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="input-note">AjayAI can make mistakes. Powered by OpenAI GPT-3.5</div>
    </div>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
